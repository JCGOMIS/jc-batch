# ============================================
# Spring Batch - Configuration PostgreSQL
# ============================================

spring:
  application:
    name: spring-batch-transactions

  # ── Datasource PostgreSQL ──────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/jc-batch
    username: postgres
    password: "Lys-Nayanka2019&"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # ── JPA / Hibernate ────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Spring Batch ───────────────────────────
  batch:
    job:
      enabled: false              # Le scheduler ou l'API REST gère le lancement
    jdbc:
      initialize-schema: always   # Crée les tables BATCH_* au démarrage
      platform: postgresql

# ── Paramètres métier du batch ───────────────
batch:
  input-file: classpath:data/transactions.csv
  chunk-size: 10
  skip-limit: 5

  # Partitioning
  partitioning:
    grid-size: 4                  # Nombre de partitions (= threads parallèles)
    pool-size: 4                  # Taille du pool de threads

  # Scheduler
  scheduler:
    enabled: true                 # Activer/désactiver le scheduling
    cron: "0 0 2 * * *"          # Tous les jours à 2h du matin
    # cron: "0 */5 * * * *"      # Toutes les 5 minutes (pour tester)
    # cron: "0 0 2 * * MON-FRI"  # Jours ouvrés uniquement