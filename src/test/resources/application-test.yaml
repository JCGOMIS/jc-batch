# ============================================
# Profil TEST — H2 en mémoire
# ============================================

spring:
  datasource:
    url: jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  batch:
    jdbc:
      initialize-schema: always

batch:
  input-file: classpath:data/transactions.csv
  chunk-size: 10
  skip-limit: 5